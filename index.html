<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, initial-scale=1.0">
    <title>Unshell AI Pro — Multi-IA sem Censura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Estilos customizados para o tema e para a barra de rolagem */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* Estilos para o tema claro */
        body.light-theme {
            background-color: #f3f4f6;
            color: #111827;
        }
        body.light-theme .glass {
            background: rgba(249, 250, 251, 0.95);
            backdrop-filter: blur(12px);
            border-color: #e5e7eb;
        }
        body.light-theme .message-user {
            background-color: #dc2626;
            color: white;
        }
        body.light-theme .message-ai {
            background-color: #e5e7eb;
            color: #1f2937;
            border-color: #d1d5db;
        }
        body.light-theme .chat-container {
            background-color: #f9fafb;
        }
        body.light-theme .input-area {
            background-color: #ffffff;
            border-color: #e5e7eb;
        }
        body.light-theme .border-custom {
            border-color: #e5e7eb;
        }
        body.light-theme .bg-custom-card {
            background-color: #ffffff;
        }
        body.light-theme .text-custom-secondary {
            color: #4b5563;
        }
        /* Animações */
        .chat-scroll { scrollbar-width: thin; }
        .message { max-width: 80%; animation: fadeInUp 0.2s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fa-spin { animation: fa-spin 2s infinite linear; }
        @keyframes fa-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 transition-colors duration-300">

<div class="max-w-6xl mx-auto px-4 py-6">
    <!-- Cabeçalho Principal com Controles de Tema e Configurações -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fa-solid fa-robot text-3xl text-black"></i>
            </div>
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tighter">Unshell AI Pro</h1>
                <p class="text-red-500 text-sm -mt-1">Multi-IA • Sem Censura</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <!-- Botão de Tema -->
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-zinc-800 transition-colors">
                <i class="fa-solid fa-moon text-xl"></i>
            </button>
            <!-- Botão de Configurações -->
            <button id="settings-btn" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition flex items-center gap-2">
                <i class="fa-solid fa-sliders-h"></i> <span class="hidden sm:inline">Configurações</span>
            </button>
            <div id="user-info" class="hidden items-center gap-3">
                <div class="px-4 py-1.5 bg-zinc-800 rounded-2xl text-sm flex items-center gap-2">
                    <i class="fa-solid fa-user text-red-500"></i>
                    <span id="username-display"></span>
                </div>
                <button onclick="logout()" class="p-2 hover:bg-zinc-800 rounded-full transition"><i class="fa-solid fa-sign-out-alt"></i></button>
            </div>
        </div>
    </div>

    <!-- Tela de Autenticação (Login/Registro) -->
    <div id="auth-screen" class="max-w-md mx-auto mt-10">
        <div class="glass bg-black/80 backdrop-blur-lg border border-zinc-800 rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-center mb-6">
                <div class="px-6 py-2 bg-zinc-800 rounded-2xl text-sm">Acesse sua conta</div>
            </div>
            <div class="flex border border-zinc-700 rounded-2xl p-1 mb-8">
                <button onclick="showLogin()" class="flex-1 py-2.5 rounded-xl font-medium transition" id="login-tab">Login</button>
                <button onclick="showRegister()" class="flex-1 py-2.5 rounded-xl font-medium transition" id="register-tab">Registro</button>
            </div>
            <div id="login-form">
                <input id="login-username" type="text" placeholder="Usuário" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 mb-4 focus:outline-none focus:border-red-600">
                <input id="login-password" type="password" placeholder="Senha" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 mb-6 focus:outline-none focus:border-red-600">
                <button onclick="login()" class="w-full bg-red-600 hover:bg-red-700 py-3.5 rounded-2xl font-semibold transition">Entrar</button>
            </div>
            <div id="register-form" class="hidden">
                <input id="reg-username" type="text" placeholder="Usuário" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 mb-4 focus:outline-none focus:border-red-600">
                <input id="reg-password" type="password" placeholder="Senha" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3.5 mb-6 focus:outline-none focus:border-red-600">
                <button onclick="register()" class="w-full bg-red-600 hover:bg-red-700 py-3.5 rounded-2xl font-semibold transition">Criar Conta</button>
            </div>
        </div>
    </div>

    <!-- Tela Principal do Chat (inicialmente oculta) -->
    <div id="chat-screen" class="hidden">
        <!-- Painel de Configurações da IA -->
        <div id="settings-panel" class="glass bg-black/80 backdrop-blur-lg border border-zinc-800 rounded-2xl p-5 mb-6 hidden transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-brain mr-2 text-red-500"></i>Configuração da IA</h3>
                <button id="close-settings" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Provedor (IA)</label>
                    <select id="ai-provider" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5">
                        <option value="gemini">Google Gemini (Requer chave API)</option>
                        <option value="openai">OpenAI (Requer chave + Base URL)</option>
                        <option value="groq">Groq (Requer chave)</option>
                        <option value="mistral">Mistral AI (Requer chave)</option>
                        <option value="deepseek">DeepSeek (Requer chave)</option>
                        <option value="cohere">Cohere (Requer chave)</option>
                        <option value="openrouter">OpenRouter (Requer chave)</option>
                        <option value="perplexity">Perplexity (Requer chave)</option>
                        <option value="together">Together.ai (Requer chave)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Chave da API</label>
                    <input type="password" id="api-key" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5" placeholder="sua-chave-api-aqui">
                </div>
                <div id="url-group" class="hidden">
                    <label class="block text-sm mb-1">Base URL (Endpoint)</label>
                    <input type="text" id="base-url" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5" placeholder="https://api.openai.com/v1">
                </div>
                <div>
                    <label class="block text-sm mb-1">Modelo</label>
                    <input type="text" id="model-name" class="w-full bg-zinc-900 border border-zinc-700 rounded-xl p-2.5" placeholder="Ex: gemini-1.5-flash, llama3-70b-8192">
                </div>
            </div>
            <button id="save-settings" class="mt-4 bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl font-semibold transition">Salvar Configuração</button>
        </div>
        
        <!-- Container do Chat -->
        <div class="glass bg-black/80 backdrop-blur-lg border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl">
            <div class="px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-robot text-black"></i>
                    </div>
                    <div>
                        <div class="font-semibold text-xl" id="ai-name-display">Unshell AI</div>
                        <div class="text-xs text-red-500 flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full inline-block"></span> Conectada</div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="clear-history-btn" class="p-2 hover:bg-zinc-800 rounded-full transition" title="Limpar Histórico"><i class="fa-regular fa-trash-alt"></i></button>
                    <button id="delete-account-btn" class="p-2 hover:bg-zinc-800 rounded-full transition text-red-500" title="Excluir Conta e Todos os Dados"><i class="fa-solid fa-user-slash"></i></button>
                </div>
            </div>
            <div id="chat" class="h-[500px] p-6 overflow-y-auto chat-scroll space-y-6 chat-container bg-zinc-950/50"></div>
            <div class="p-5 border-t border-zinc-800 input-area bg-zinc-950">
                <div class="flex gap-3">
                    <input id="input" type="text" placeholder="Manda sua mensagem..." class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-red-600 rounded-2xl px-6 py-3.5 outline-none">
                    <button id="send-btn" class="bg-red-600 hover:bg-red-700 px-6 rounded-2xl font-semibold transition flex items-center gap-2">
                        <span>Enviar</span> <i class="fa-regular fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-xs text-center text-zinc-500 mt-3">⚠️ A API key fica apenas no seu navegador.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Elementos do DOM ---
    const authScreen = document.getElementById('auth-screen');
    const chatScreen = document.getElementById('chat-screen');
    const userInfoDiv = document.getElementById('user-info');
    const usernameDisplay = document.getElementById('username-display');
    const chatDiv = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const aiNameDisplay = document.getElementById('ai-name-display');
    const clearHistoryBtn = document.getElementById('clear-history-btn');
    const deleteAccountBtn = document.getElementById('delete-account-btn');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const closeSettingsBtn = document.getElementById('close-settings');
    const saveSettingsBtn = document.getElementById('save-settings');
    const aiProviderSelect = document.getElementById('ai-provider');
    const apiKeyInput = document.getElementById('api-key');
    const baseUrlInput = document.getElementById('base-url');
    const modelNameInput = document.getElementById('model-name');
    const urlGroup = document.getElementById('url-group');
    const themeToggleBtn = document.getElementById('theme-toggle');

    let currentUsername = null;
    let currentConfig = { provider: 'gemini', apiKey: '', baseUrl: '', model: '' };
    let isApiCallInProgress = false;

    // --- Funções de Autenticação ---
    function showLogin() { /* ... (código de UI para abas) ... */ 
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('register-form').classList.add('hidden');
        document.getElementById('login-tab').classList.add('bg-zinc-800');
        document.getElementById('register-tab').classList.remove('bg-zinc-800');
    }
    function showRegister() { 
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('register-form').classList.remove('hidden');
        document.getElementById('register-tab').classList.add('bg-zinc-800');
        document.getElementById('login-tab').classList.remove('bg-zinc-800');
    }
    function register() {
        const user = document.getElementById('reg-username').value.trim();
        const pass = document.getElementById('reg-password').value.trim();
        if (!user || !pass) return alert("Preencha todos os campos");
        if (localStorage.getItem(`unshell_user_${user}`)) return alert("Usuário já existe!");
        localStorage.setItem(`unshell_user_${user}`, JSON.stringify({ password: pass, config: null, messages: [] }));
        loginUser(user, pass);
    }
    function login() {
        const user = document.getElementById('login-username').value.trim();
        const pass = document.getElementById('login-password').value.trim();
        const userData = localStorage.getItem(`unshell_user_${user}`);
        if (!userData) return alert("Usuário não encontrado");
        const data = JSON.parse(userData);
        if (data.password === pass) loginUser(user, pass);
        else alert("Senha incorreta");
    }
    function loginUser(username, password) {
        currentUsername = username;
        localStorage.setItem('unshell_logged', 'true');
        localStorage.setItem('unshell_current_user', username);
        authScreen.classList.add('hidden');
        chatScreen.classList.remove('hidden');
        userInfoDiv.classList.remove('hidden');
        usernameDisplay.innerText = username;
        loadUserConfigAndMessages();
        addWelcomeMessage();
    }
    function logout() {
        localStorage.removeItem('unshell_logged');
        location.reload();
    }

    // --- Gerenciamento de Dados do Usuário (Configurações e Histórico) ---
    function getUserStorageKey() { return `unshell_user_${currentUsername}`; }
    function loadUserConfigAndMessages() {
        const userData = JSON.parse(localStorage.getItem(getUserStorageKey()) || '{}');
        if (userData.config) {
            currentConfig = userData.config;
            aiProviderSelect.value = currentConfig.provider || 'gemini';
            apiKeyInput.value = currentConfig.apiKey || '';
            baseUrlInput.value = currentConfig.baseUrl || '';
            modelNameInput.value = currentConfig.model || '';
            toggleUrlField();
            updateAiNameDisplay();
        }
        if (userData.messages && userData.messages.length) {
            chatDiv.innerHTML = '';
            userData.messages.forEach(msg => {
                addMessageToUI(msg.text, msg.isUser);
            });
        }
    }
    function saveConfigToUser() {
        const userData = JSON.parse(localStorage.getItem(getUserStorageKey()) || '{}');
        userData.config = currentConfig;
        localStorage.setItem(getUserStorageKey(), JSON.stringify(userData));
    }
    function saveMessageToHistory(text, isUser) {
        const userData = JSON.parse(localStorage.getItem(getUserStorageKey()) || '{}');
        const messages = userData.messages || [];
        messages.push({ text, isUser, timestamp: Date.now() });
        userData.messages = messages;
        localStorage.setItem(getUserStorageKey(), JSON.stringify(userData));
    }
    function clearHistory() {
        if (confirm("Limpar todo o histórico de conversas?")) {
            const userData = JSON.parse(localStorage.getItem(getUserStorageKey()) || '{}');
            userData.messages = [];
            localStorage.setItem(getUserStorageKey(), JSON.stringify(userData));
            chatDiv.innerHTML = '';
            addWelcomeMessage();
        }
    }
    function deleteAccount() {
        if (confirm("⚠️ ISSO É IRREVERSÍVEL! Tem certeza que deseja excluir permanentemente sua conta e todos os seus dados?")) {
            localStorage.removeItem(getUserStorageKey());
            localStorage.removeItem('unshell_logged');
            localStorage.removeItem('unshell_current_user');
            alert("Conta excluída com sucesso.");
            location.reload();
        }
    }

    // --- Interface do Chat ---
    function addMessageToUI(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message`;
        div.innerHTML = `<div class="message px-5 py-3.5 rounded-2xl text-[15px] ${isUser ? 'bg-red-600 text-white message-user' : 'bg-zinc-800 border border-zinc-700 message-ai'}">${text.replace(/\n/g, '<br>')}</div>`;
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    function addWelcomeMessage() { 
        const welcomeMsg = `Olá, ${currentUsername}! Eu sou ${currentConfig.provider === 'gemini' ? 'Gemini' : currentConfig.provider.toUpperCase()}. Como posso ajudar hoje?`;
        addMessageToUI(welcomeMsg);
        saveMessageToHistory(welcomeMsg, false);
    }
    async function sendMessage() {
        if (isApiCallInProgress) return;
        const userMessage = inputEl.value.trim();
        if (!userMessage) return;
        addMessageToUI(userMessage, true);
        saveMessageToHistory(userMessage, true);
        inputEl.value = '';
        isApiCallInProgress = true;
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aguarde';
        
        const thinkingId = Date.now();
        addMessageToUI('🤔 *Pensando...*', false);
        
        try {
            const aiResponse = await callAIAPI(userMessage);
            document.querySelector(`.message:last-child`).remove();
            addMessageToUI(aiResponse, false);
            saveMessageToHistory(aiResponse, false);
        } catch (error) {
            console.error(error);
            document.querySelector(`.message:last-child`).remove();
            addMessageToUI(`❌ Erro na IA: ${error.message}`, false);
        } finally {
            isApiCallInProgress = false;
            sendBtn.disabled = false;
            sendBtn.innerHTML = '<span>Enviar</span> <i class="fa-regular fa-paper-plane"></i>';
        }
    }
    
    // --- Integração com as APIs (O CÉREBRO DA COISA) ---
    async function callAIAPI(userMessage) {
        const { provider, apiKey, baseUrl, model } = currentConfig;
        if (!apiKey) throw new Error("Chave de API não configurada.");
        
        // Caso especial: Gemini
        if (provider === 'gemini') {
            const geminiModel = model || "gemini-1.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: userMessage }] }] })
            });
            if (!response.ok) throw new Error(`Gemini Error: ${response.status}`);
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta do Gemini.";
        } 
        // Para as demais (OpenAI, Groq, Mistral, DeepSeek, etc)
        else {
            const endpoint = baseUrl || "https://api.openai.com/v1";
            const modelName = model || "gpt-3.5-turbo";
            const response = await fetch(`${endpoint}/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: modelName,
                    messages: [{ role: "user", content: userMessage }],
                    temperature: 0.7,
                    max_tokens: 800
                })
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API Error (${response.status}): ${errText.substring(0, 100)}`);
            }
            const data = await response.json();
            return data.choices?.[0]?.message?.content || "Resposta vazia da IA.";
        }
    }
    
    // --- Utilitários de Configuração e UI ---
    function toggleUrlField() {
        if (aiProviderSelect.value !== 'gemini') urlGroup.classList.remove('hidden');
        else urlGroup.classList.add('hidden');
    }
    function updateAiNameDisplay() {
        let name = currentConfig.provider.toUpperCase();
        if (currentConfig.model) name += ` (${currentConfig.model})`;
        else name += " AI";
        aiNameDisplay.innerText = name;
    }
    function saveSettings() {
        currentConfig = {
            provider: aiProviderSelect.value,
            apiKey: apiKeyInput.value.trim(),
            baseUrl: baseUrlInput.value.trim(),
            model: modelNameInput.value.trim()
        };
        saveConfigToUser();
        updateAiNameDisplay();
        settingsPanel.classList.add('hidden');
        alert("Configuração salva! A IA agora está integrada.");
        // Limpa chat e recarrega mensagens para não ter conflito
        chatDiv.innerHTML = '';
        loadUserConfigAndMessages();
    }
    
    // --- Tema Claro/Escuro ---
    function initTheme() {
        const savedTheme = localStorage.getItem('unshell_theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-theme');
            themeToggleBtn.innerHTML = '<i class="fa-regular fa-sun text-xl"></i>';
        } else {
            document.body.classList.remove('light-theme');
            themeToggleBtn.innerHTML = '<i class="fa-regular fa-moon text-xl"></i>';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('light-theme')) {
            document.body.classList.remove('light-theme');
            localStorage.setItem('unshell_theme', 'dark');
            themeToggleBtn.innerHTML = '<i class="fa-regular fa-moon text-xl"></i>';
        } else {
            document.body.classList.add('light-theme');
            localStorage.setItem('unshell_theme', 'light');
            themeToggleBtn.innerHTML = '<i class="fa-regular fa-sun text-xl"></i>';
        }
    }
    
    // --- Event Listeners e Inicialização ---
    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    clearHistoryBtn.addEventListener('click', clearHistory);
    deleteAccountBtn.addEventListener('click', deleteAccount);
    settingsBtn.addEventListener('click', () => settingsPanel.classList.toggle('hidden'));
    closeSettingsBtn.addEventListener('click', () => settingsPanel.classList.add('hidden'));
    saveSettingsBtn.addEventListener('click', saveSettings);
    aiProviderSelect.addEventListener('change', toggleUrlField);
    themeToggleBtn.addEventListener('click', toggleTheme);
    
    window.onload = () => {
        initTheme();
        const logged = localStorage.getItem('unshell_logged');
        const user = localStorage.getItem('unshell_current_user');
        if (logged === 'true' && user) {
            currentUsername = user;
            authScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            userInfoDiv.classList.remove('hidden');
            usernameDisplay.innerText = user;
            loadUserConfigAndMessages();
        }
        toggleUrlField();
    };
</script>
</body>
</html>
